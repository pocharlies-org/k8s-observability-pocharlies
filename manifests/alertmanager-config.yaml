apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAlertmanagerConfig
metadata:
  name: synapse-webhook
  namespace: monitoring
spec:
  route:
    receiver: synapse-alertmanager
    group_by:
      - alertname
      - namespace
      - severity
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      # Critical alerts go to Synapse (LLM card) AND straight to Telegram.
      # The direct Telegram leg does not depend on Synapse, so a Synapse
      # outage (e.g. SynapseDown itself) still reaches the operator.
      - matchers:
          - "severity = critical"
        receiver: synapse-with-telegram-backup
  receivers:
    - name: synapse-alertmanager
      webhook_configs:
        - url: https://synapse.e-dani.com/webhooks/alertmanager
          send_resolved: true
    - name: synapse-with-telegram-backup
      webhook_configs:
        - url: https://synapse.e-dani.com/webhooks/alertmanager
          send_resolved: true
      telegram_configs:
        - send_resolved: true
          bot_token:
            name: alertmanager-telegram-backup
            key: bot_token
          chat_id: -1003785136626
          parse_mode: HTML
