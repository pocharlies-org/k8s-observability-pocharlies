# Bot token for the direct-to-Telegram BACKUP receiver. Synapse is
# Alertmanager's normal delivery path (webhook); this secret powers the
# fallback that fires for critical alerts so they survive a Synapse
# outage. Value lives in Vault at secret/observability/prod/telegram.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-telegram-backup
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: telegram-backup
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: alertmanager-telegram-backup
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        bot_token: "{{ .synapse_bot_token }}"
  data:
    - secretKey: synapse_bot_token
      remoteRef:
        key: observability/prod/telegram
        property: synapse_bot_token
